weather:
  rainfall_conversions:
    mm_3hr_to_mm_hr: 0.333  # 1/3
    mm_day_to_mm_hr: 0.0417  # 1/24
  temperature_conversions:
    kelvin_to_celsius: -273.15
    fahrenheit_to_celsius: -32, *0.5556  # (F-32)*5/9
  wind_speed_conversions:
    knots_to_ms: 0.514
    kmh_to_ms: 0.2778
  source_quality:
    freshness_penalty_per_hour: 0.1
    provider_reliability:
      openweather: 0.9
      accuweather: 0.85
      default: 0.7
    missing_field_penalty: 0.05

aqi:
  naqi_to_us_aqi:
    # Hardcoded conversion table based on WHO breakpoints
    # NAQI ranges to US AQI equivalents
    0-50: 0-50
    51-100: 51-100
    101-200: 101-150
    201-300: 151-200
    301-400: 201-300
    401-500: 301-500
  pollutant_units:
    pm25: ug_m3  # already in µg/m³
    pm10: ug_m3
    no2: ppb_to_ug_m3: 1.88  # conversion factor
    o3: ppb_to_ug_m3: 2.0
    so2: ppb_to_ug_m3: 2.62
    co: ppm_to_mg_m3: 1.145  # but we'll keep as µg/m³ if needed

telemetry:
  india_bbox:
    lat_min: 6.5
    lat_max: 35.5
    lon_min: 68.0
    lon_max: 97.5
  speed_cap_kmh: 200
  imu_devices:
    device_abc:
      accel_scale: 0.001  # ADC to m/s²
    device_xyz:
      accel_scale: 0.002
    default:
      accel_scale: 0.001
  worker_id_to_device:
    worker_1: device_abc
    worker_2: device_xyz